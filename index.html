<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
            font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
        }
      body {
  text-align: center;
  font-family: Arial;
}

input {
  padding: 10px;
  width: 250px;
}

button {
  padding: 10px;
  cursor: pointer;
}

#result {
  margin-top: 20px;
}
    </style>
</head>
    
<body>
  
 
  <h1>🎬 Movie Search App</h1>

  <input type="text" id="searchBox" placeholder="Enter movie name">
  <button onclick="searchMovie()">Search</button>

  <div id="result"></div>

 </html>
    <script>
    async function searchMovie() {
  let movie = document.getElementById("searchBox").value;

  let apiKey = "YOUR_API_KEY"; // yaha apni API key daalo

  let url = `https://www.omdbapi.com/?t=${movie}&apikey=${apiKey}`;

  let response = await fetch(url);
  let data = await response.json();

  let resultDiv = document.getElementById("result");

  if (data.Response === "True") {
    resultDiv.innerHTML = `
      <h2>${data.Title}</h2>
      <img src="${data.Poster}" />
      <p>Year: ${data.Year}</p>
      <p>Genre: ${data.Genre}</p>
      <p>Plot: ${data.Plot}</p>
    `;
  } else {
    resultDiv.innerHTML = `<p>Movie not found 😢</p>`;
  }
}  
    </script>
</body>
</html>
